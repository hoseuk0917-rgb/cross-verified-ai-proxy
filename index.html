<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cross-Verified AI v9.7.4 Rev D - 테스트</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            text-align: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .card h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            color: #555;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .input-group input,
        .input-group textarea,
        .input-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .input-group input:focus,
        .input-group textarea:focus,
        .input-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-group textarea {
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-right: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #6c757d;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .result {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid #667eea;
        }

        .result h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 12px;
        }

        .result-item {
            background: white;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .result-item:last-child {
            margin-bottom: 0;
        }

        .result-label {
            font-size: 12px;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .result-value {
            font-size: 14px;
            color: #333;
        }

        .confidence-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
            margin: 10px 0;
        }

        .confidence-badge.green {
            background: #d4edda;
            color: #155724;
        }

        .confidence-badge.yellow {
            background: #fff3cd;
            color: #856404;
        }

        .confidence-badge.red {
            background: #f8d7da;
            color: #721c24;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .engine-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        .engine-card {
            background: white;
            border: 2px solid #e0e0e0;
            padding: 12px;
            border-radius: 8px;
        }

        .engine-name {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
        }

        .engine-stat {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .engine-stat-label {
            color: #666;
        }

        .engine-stat-value {
            color: #333;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🔍 Cross-Verified AI v9.7.4 Rev D</h1>
            <p>다중 출처 검증 AI 플랫폼 테스트 페이지</p>
        </div>

        <!-- API Key Configuration -->
        <div class="card">
            <h2>🔑 API Key 설정</h2>
            <div class="input-group">
                <label for="geminiKey">Gemini API Key</label>
                <input type="password" id="geminiKey" placeholder="AIzaSy...">
            </div>
            <div class="input-group">
                <label for="githubKey">GitHub API Key (선택)</label>
                <input type="password" id="githubKey" placeholder="ghp_...">
            </div>
            <button class="btn" onclick="saveKeys()">저장</button>
            <button class="btn btn-secondary" onclick="testKeys()">연결 테스트</button>
            <div id="keyStatus"></div>
        </div>

        <!-- Question & Verification -->
        <div class="card">
            <h2>💬 질문 및 검증</h2>
            <div class="input-group">
                <label for="mode">모드 선택</label>
                <select id="mode">
                    <option value="QV">QV - 질문 검증</option>
                    <option value="FV">FV - 사실 검증</option>
                    <option value="DV">DV - 개발 검증</option>
                    <option value="CV">CV - 코드 검증 (Pro)</option>
                    <option value="LM">LM - 법령 정보</option>
                </select>
            </div>
            <div class="input-group">
                <label for="question">질문</label>
                <textarea id="question" placeholder="질문을 입력하세요...">양자컴퓨터의 원리를 설명해주세요.</textarea>
            </div>
            <button class="btn" onclick="verifyComplete()">검증 시작</button>
            <div id="verifyResult"></div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        // API Key 저장
        async function saveKeys() {
            const gemini = document.getElementById('geminiKey').value;
            const github = document.getElementById('githubKey').value;

            if (!gemini) {
                alert('Gemini API Key를 입력해주세요');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/config/keys`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ gemini, github })
                });

                const data = await response.json();
                
                const statusDiv = document.getElementById('keyStatus');
                if (data.success) {
                    statusDiv.innerHTML = `
                        <div class="status success" style="margin-top: 12px;">
                            ✅ API Keys 저장 완료
                        </div>
                    `;
                } else {
                    statusDiv.innerHTML = `
                        <div class="status error" style="margin-top: 12px;">
                            ❌ 오류: ${data.error}
                        </div>
                    `;
                }
            } catch (error) {
                alert('오류: ' + error.message);
            }
        }

        // API Key 테스트
        async function testKeys() {
            const statusDiv = document.getElementById('keyStatus');
            statusDiv.innerHTML = `
                <div style="margin-top: 12px;">
                    <span class="loading"></span> 연결 테스트 중...
                </div>
            `;

            try {
                const response = await fetch(`${API_BASE}/api/config/test`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await response.json();
                
                if (data.success) {
                    const geminiResult = data.results.gemini;
                    const githubResult = data.results.github;
                    
                    statusDiv.innerHTML = `
                        <div class="status ${geminiResult.success ? 'success' : 'error'}" style="margin-top: 12px;">
                            ${geminiResult.success ? '✅' : '❌'} Gemini: ${geminiResult.message}
                        </div>
                        <div class="status ${githubResult.success ? 'success' : 'error'}" style="margin-top: 8px;">
                            ${githubResult.success ? '✅' : '❌'} GitHub: ${githubResult.message}
                        </div>
                    `;
                } else {
                    statusDiv.innerHTML = `
                        <div class="status error" style="margin-top: 12px;">
                            ❌ 오류: ${data.error}
                        </div>
                    `;
                }
            } catch (error) {
                statusDiv.innerHTML = `
                    <div class="status error" style="margin-top: 12px;">
                        ❌ 네트워크 오류: ${error.message}
                    </div>
                `;
            }
        }

        // 전체 검증
        async function verifyComplete() {
            const question = document.getElementById('question').value;
            const mode = document.getElementById('mode').value;
            const resultDiv = document.getElementById('verifyResult');

            if (!question) {
                alert('질문을 입력해주세요');
                return;
            }

            resultDiv.innerHTML = `
                <div class="result">
                    <span class="loading"></span> 답변 생성 및 검증 중...
                </div>
            `;

            try {
                const response = await fetch(`${API_BASE}/api/verify/complete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question, mode, includeGeneration: true })
                });

                const data = await response.json();
                
                if (!data.success) {
                    resultDiv.innerHTML = `
                        <div class="result">
                            <div class="status error">❌ 오류: ${data.error}</div>
                        </div>
                    `;
                    return;
                }

                // 결과 표시
                const confidence = data.verification.confidence;
                const confidenceClass = confidence.color;
                
                let enginesHtml = '';
                data.verification.engines.forEach(engine => {
                    enginesHtml += `
                        <div class="engine-card">
                            <div class="engine-name">${engine.engine}</div>
                            <div class="engine-stat">
                                <span class="engine-stat-label">신뢰도 (Rᵢ):</span>
                                <span class="engine-stat-value">${engine.Ri}</span>
                            </div>
                            <div class="engine-stat">
                                <span class="engine-stat-label">품질 (Qᵢ):</span>
                                <span class="engine-stat-value">${engine.Qi}</span>
                            </div>
                            <div class="engine-stat">
                                <span class="engine-stat-label">시간감쇠:</span>
                                <span class="engine-stat-value">${engine.timeDecay}</span>
                            </div>
                            <div class="engine-stat">
                                <span class="engine-stat-label">가중치 (wᵢ):</span>
                                <span class="engine-stat-value">${engine.wi}</span>
                            </div>
                            <div class="engine-stat">
                                <span class="engine-stat-label">출처:</span>
                                <span class="engine-stat-value">${engine.sources}개</span>
                            </div>
                        </div>
                    `;
                });

                resultDiv.innerHTML = `
                    <div class="result">
                        <h3>📊 검증 결과</h3>
                        
                        <div class="result-item">
                            <div class="result-label">TruthScore (신뢰도 점수)</div>
                            <div class="result-value" style="font-size: 32px; font-weight: 700; color: #667eea;">
                                ${data.verification.truthScore}%
                            </div>
                            <div class="confidence-badge ${confidenceClass}">
                                ${confidence.icon} ${confidence.label}
                            </div>
                        </div>

                        ${data.answer ? `
                        <div class="result-item">
                            <div class="result-label">Gemini 답변</div>
                            <div class="result-value" style="line-height: 1.6;">${data.answer}</div>
                        </div>
                        ` : ''}

                        <div class="result-item">
                            <div class="result-label">검증 엔진 상세</div>
                            <div class="engine-details">
                                ${enginesHtml}
                            </div>
                        </div>

                        <div class="result-item">
                            <div class="result-label">통계</div>
                            <div class="result-value">
                                <strong>활성 엔진:</strong> ${data.verification.engines.length}개<br>
                                <strong>총 출처:</strong> ${data.verification.totalSources}개<br>
                                <strong>평균 일치도:</strong> ${data.verification.avgConsistency}<br>
                                <strong>처리 시간:</strong> ${data.performance.totalTime}
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result">
                        <div class="status error">❌ 오류: ${error.message}</div>
                    </div>
                `;
            }
        }

        // 페이지 로드 시 서버 상태 확인
        window.addEventListener('load', async () => {
            try {
                const response = await fetch(`${API_BASE}/api/status`);
                const data = await response.json();
                console.log('서버 상태:', data);
            } catch (error) {
                console.error('서버 연결 오류:', error);
            }
        });
    </script>
</body>
</html>
